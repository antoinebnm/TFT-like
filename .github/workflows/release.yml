name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: Build-StandaloneWindows64
          path: release

      - name: Zip build
        run: zip -r game.zip release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: game.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
